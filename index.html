<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer NCC Roma - Fabio Cavalieri</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    padding: 80px 20px;
    text-align: center;
}

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: #22c55e;
    color: white;
    border-radius: 30px;
    text-decoration: none;
}

section {
    padding: 50px 20px;
    text-align: center;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 260px;
}

form {
    max-width: 500px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input, button {
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

footer {
    background: #020617;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <h1>🚗 Transfer NCC Roma</h1>
    <p>Servizi professionali di trasporto</p>

    <a class="btn" href="https://wa.me/393895009266?text=Ciao%20sono%20interessato%20al%20servizio%20NCC" target="_blank">
        📲 WhatsApp
    </a>

    <p>📧 Email: fabio.cavalieri@libero.it</p>
</header>

<section>
    <h2>I Nostri Servizi</h2>

    <div class="cards">
        <div class="card">✈️ Aeroporti</div>
        <div class="card">🚢 Crociere</div>
        <div class="card">👨‍👩‍👧‍👦 Gruppi</div>
    </div>
</section>

<section>
    <h2>📩 Richiedi Prenotazione</h2>

    <form action="https://formsubmit.co/fabio.cavalieri@libero.it" method="POST">
        
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="text" name="cognome" placeholder="Cognome" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="telefono" placeholder="Telefono / Cellulare" required>

        <input type="date" name="data" required>
        <input type="time" name="ora" required>

        <!-- evita captcha -->
        <input type="hidden" name="_captcha" value="false">

        <!-- redirect dopo invio -->
        <input type="hidden" name="_next" value="https://carosello75.github.io/Sito-web-prova/">

        <button type="submit">Invia richiesta</button>
    </form>

</section>

<footer>
    <p id="datetime"></p>
    <p>© 2026 Fabio Cavalieri - fabio.cavalieri@libero.it</p>
</footer>

<script>
function aggiornaDataOra() {
    const now = new Date();
    const testo = now.toLocaleString("it-IT");
    document.getElementById("datetime").innerText = "Data e ora: " + testo;
}

aggiornaDataOra();
setInterval(aggiornaDataOra, 1000);
</script>

</body>
</html>
